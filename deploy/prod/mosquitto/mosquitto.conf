per_listener_settings false
allow_anonymous false

listener 8883
require_certificate false

# These paths match where Caddy stores certs inside its data volume.
# The issuer directory may differ if you use ZeroSSL instead of Let's Encrypt
# (replace acme-v02.api.letsencrypt.org-directory with acme.zerossl.com-directory).
# __MQTT_DOMAIN__ is replaced at container start by entrypoint.sh (see MQTT_DOMAIN in .env).
certfile /mosquitto/certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/__MQTT_DOMAIN__/__MQTT_DOMAIN__.crt
keyfile  /mosquitto/certs/caddy/certificates/acme-v02.api.letsencrypt.org-directory/__MQTT_DOMAIN__/__MQTT_DOMAIN__.key

plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynamic-security/dynamic-security.json

persistence true
persistence_location /mosquitto/data/
