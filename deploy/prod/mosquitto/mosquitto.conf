per_listener_settings false
allow_anonymous false

listener 8883
require_certificate false

# UPDATE mqtt.yourdomain.com TO YOUR ACTUAL MQTT DOMAIN
# These paths match where Caddy stores certs inside the container.
# The issuer directory may differ if you use ZeroSSL instead of Let's Encrypt
# (replace acme-v02.api.letsencrypt.org-directory with acme.zerossl.com-directory).
certfile /mosquitto/certs/acme-v02.api.letsencrypt.org-directory/mqtt.yourdomain.com/mqtt.yourdomain.com.crt
keyfile  /mosquitto/certs/acme-v02.api.letsencrypt.org-directory/mqtt.yourdomain.com/mqtt.yourdomain.com.key

plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynamic-security/dynamic-security.json

persistence true
persistence_location /mosquitto/data/
